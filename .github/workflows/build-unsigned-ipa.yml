name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned app
        run: |
          set -euo pipefail
          xcodebuild \
            -project SurfieECU.xcodeproj \
            -scheme SurfieECU \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build \
            SYMROOT="$PWD/build"

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="$PWD/build/Release-iphoneos/SurfieECU.app"
          test -d "$APP_PATH"
          rm -rf Payload SurfieECU-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry SurfieECU-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SurfieECU-unsigned-ipa
          path: SurfieECU-unsigned.ipa
