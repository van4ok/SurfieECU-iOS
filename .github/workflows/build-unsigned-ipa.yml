name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned app
        run: |
          set -euo pipefail
          xcodebuild \
            -project SurfieECU.xcodeproj \
            -scheme SurfieECU \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build \
            SYMROOT="$PWD/build" | tee xcodebuild.log

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="$PWD/build/Release-iphoneos/SurfieECU.app"
          test -d "$APP_PATH"
          test -f "$APP_PATH/SurfieECU"
          {
            echo "App path: $APP_PATH"
            echo
            echo "App bundle size:"
            du -sh "$APP_PATH"
            echo
            echo "Executable:"
            ls -lh "$APP_PATH/SurfieECU"
            file "$APP_PATH/SurfieECU"
            echo
            echo "Bundle contents:"
            find "$APP_PATH" -maxdepth 3 -type f -print | sort
          } | tee app-bundle-manifest.txt
          rm -rf Payload SurfieECU-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry SurfieECU-unsigned.ipa Payload
          ls -lh SurfieECU-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SurfieECU-unsigned-ipa
          path: SurfieECU-unsigned.ipa

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log

      - name: Upload app bundle manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle-manifest
          path: app-bundle-manifest.txt
