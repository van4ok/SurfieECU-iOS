      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.surfie.ecu
        INFOPLIST_FILE: App/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    scheme:
      testTargets: []
